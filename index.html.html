<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Calcutta War Room</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e17;color:#e0e4ec;padding:0;font-size:13px}
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
#setup.hidden{display:none}
.slogo{font-size:28px;font-weight:800;color:#f0c040;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.ssub{font-size:12px;color:#7a8299;margin-bottom:24px}
.sbtn{background:#f0c040;color:#0a0e17;font-size:16px;font-weight:800;padding:16px 48px;border:none;border-radius:12px;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px}
.sbtn:hover{background:#ffd04a}
#warroom{display:none;padding:10px}
#warroom.active{display:block}
.hdr{text-align:center;padding:10px 0 6px;border-bottom:1px solid rgba(255,255,255,0.08)}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:1px;color:#f0c040;text-transform:uppercase}
.hdr p{font-size:10px;color:#7a8299;margin-top:2px}
.ntabs{display:flex;gap:0;border-bottom:2px solid rgba(255,255,255,0.06);margin:8px 0 0}
.ntab{padding:8px 16px;font-size:11px;font-weight:700;color:#7a8299;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;text-transform:uppercase;letter-spacing:0.5px}
.ntab.active{color:#f0c040;border-bottom-color:#f0c040}
.ntab:hover:not(.active){color:#bbb}
.page{display:none}.page.active{display:block}
.gn{color:#22c55e}.rd{color:#ef4444}
/* Summary */
.sc{background:#151b2b;border-radius:8px;padding:14px;margin:8px 0}
.sc h3{font-size:13px;color:#f0c040;margin-bottom:8px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin:8px 0}
.ss{background:rgba(0,0,0,0.2);border-radius:6px;padding:8px;text-align:center}
.ss .sv{font-size:18px;font-weight:800;color:#f0c040}.ss .sl{font-size:8px;color:#7a8299;text-transform:uppercase}
.sr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px}
.sr:last-child{border:none}.sr .sn{color:#fff;font-weight:600}.sr .sd2{color:#7a8299;font-size:9px}
.sr .sp{color:#f0c040;font-weight:700}.sr .se{font-size:9px}
.gc{background:#151b2b;border-radius:6px;padding:8px;margin-bottom:4px}
.gc h4{font-size:11px;color:#ddd;margin-bottom:4px}.gc.me{border-left:3px solid #22c55e}.gc.me h4{color:#22c55e}
/* Bracket panel */
.bpnl{background:#151b2b;border-radius:10px;padding:10px 12px;margin:8px 0;position:sticky;top:0;z-index:10}
.bpg{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:6px}
.bpc{text-align:center;padding:4px 2px;border-radius:4px;background:rgba(0,0,0,0.2)}
.bpc .bpr{font-size:7px;color:#7a8299;text-transform:uppercase}.bpc .bpa{font-size:12px;font-weight:700;color:#f0c040}
.bpcx{background:rgba(240,192,64,0.1)}
.bpa.pos{color:#22c55e}.bpa.neg{color:#ef4444}
.bpl{display:flex;justify-content:center;gap:16px;font-size:11px;color:#7a8299}
/* Bracket - AuctionCutta style */
.brk-wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;overflow-x:auto;min-width:900px}
.brk-half{display:flex;flex-direction:column;gap:0}
.brk-rgn{background:rgba(0,0,0,0.15);border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:8px 6px;margin:4px}
.brk-rgn-title{font-size:18px;font-weight:900;text-align:center;padding:8px 0 4px;letter-spacing:2px;text-transform:uppercase}
.brk-rgn-title.south{color:#f0a040}.brk-rgn-title.east{color:#4a9eff}.brk-rgn-title.west{color:#22c55e}.brk-rgn-title.midwest{color:#a78bfa}
.brk-hdrs{display:grid;gap:2px;font-size:8px;color:#556;text-transform:uppercase;letter-spacing:0.8px;text-align:center;padding:0 2px 4px}
.brk-hdrs.ltr{grid-template-columns:2fr 1.5fr 1fr 1fr}
.brk-hdrs.rtl{grid-template-columns:1fr 1fr 1.5fr 2fr}
.brk-cols{display:grid;gap:2px}
.brk-cols.ltr{grid-template-columns:2fr 1.5fr 1fr 1fr}
.brk-cols.rtl{grid-template-columns:1fr 1fr 1.5fr 2fr}
.brk-col{display:flex;flex-direction:column;gap:1px}
.brk-mu{background:rgba(10,14,23,0.5);border:1px solid rgba(255,255,255,0.04);border-radius:4px;padding:1px;margin-bottom:1px}
.brk-tm{display:flex;align-items:center;gap:4px;padding:4px 5px;border-radius:3px;cursor:pointer;transition:all 0.15s;position:relative}
.brk-tm:hover{background:rgba(240,160,64,0.08)}
.brk-tm.pk{background:rgba(240,160,64,0.15);border:1px solid rgba(240,160,64,0.3)}
.brk-tm.mine{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.15)}
.brk-tm.mine.pk{background:rgba(34,197,94,0.18);border-color:rgba(34,197,94,0.4)}
.brk-tm.empty{opacity:0.25;cursor:default}
.brk-tm .tm-seed{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0;background:rgba(255,255,255,0.08);color:#7a8299}
.brk-tm.mine .tm-seed{background:rgba(34,197,94,0.2);color:#22c55e}
.brk-tm .tm-info{flex:1;min-width:0;overflow:hidden}
.brk-tm .tm-name{font-size:10px;font-weight:700;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brk-tm.mine .tm-name{color:#22c55e}
.brk-tm .tm-owner{font-size:7px;color:#556;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brk-tm.mine .tm-owner{color:rgba(34,197,94,0.6)}
.brk-tm .tm-price{font-size:10px;font-weight:800;color:#f0a040;flex-shrink:0;margin-left:auto}
.brk-tm.empty .tm-name{color:#333;font-style:italic;font-weight:400}
/* Final Four center */
.brk-ff-center{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:12px}
.brk-ff-label{font-size:16px;font-weight:900;color:#f0c040;letter-spacing:2px;text-transform:uppercase}
.brk-ff-semis{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;width:100%;max-width:600px}
.brk-ff-game{background:rgba(10,14,23,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:10px}
.brk-ff-game-label{font-size:8px;color:#556;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;text-align:center}
.brk-ff-vs{color:#444;font-size:12px;font-weight:900;letter-spacing:1px}
.brk-champ-box{background:rgba(240,192,64,0.06);border:2px solid rgba(240,192,64,0.2);border-radius:8px;padding:12px;width:100%;max-width:280px}
.brk-champ-label{font-size:9px;color:#f0c040;text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:6px;font-weight:700}
.brk-champ-winner{text-align:center;font-size:22px;font-weight:900;color:#fff;padding:6px 0;background:rgba(240,192,64,0.1);border-radius:6px;margin-top:6px;letter-spacing:1px}
.brk-clear-row{text-align:right;padding:4px 8px}
.brk-clear-btn{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25);padding:6px 14px;border-radius:6px;font-size:9px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px}
.brk-clear-btn:hover{background:rgba(239,68,68,0.2)}
@media(max-width:950px){.brk-wrap{min-width:unset;grid-template-columns:1fr}.brk-ff-semis{grid-template-columns:1fr}}
</style>
</head>

    } else {
      s.s16[gi].winner=pick;
      if(!s.e8)s.e8={a:null,b:null,winner:null};
      s.e8[gi===0?'a':'b']=pick;
      s.e8.winner=null;s.winner=null;clearFF();
    }
  } else if(round==='e8'){
    if(s.e8.winner&&s.e8.winner[0]===pick[0]){
      s.e8.winner=null;s.winner=null;clearFF();
    } else {
      s.e8.winner=pick;s.winner=pick;updateFF();
    }
  }
  calcW();renderBrkPnl();renderBrk();
}

function clearDown(rgn,fr,idx){
  var s=brkState[rgn];
  if(fr==='r32'){var si=Math.floor(idx/2);if(s.s16[si])s.s16[si].winner=null;if(s.e8)s.e8.winner=null;s.winner=null;clearFF();}
  else if(fr==='s16'){if(s.e8)s.e8.winner=null;s.winner=null;clearFF();}
}
function clearFF(){brkState.ff={s1:null,s2:null,champ:null};}
function updateFF(){
  var ff=brkState.ff;ff.s1=null;ff.s2=null;ff.champ=null;
  var sw=brkState.South.winner,ew=brkState.East.winner;
  var ww=brkState.West.winner,mw=brkState.Midwest.winner;
  if(sw&&ew)ff.s1={a:sw,b:ew,winner:null};
  if(ww&&mw)ff.s2={a:ww,b:mw,winner:null};
}
function advanceFF(semi,pick){
  var ff=brkState.ff;
  if(semi===1&&ff.s1){
    if(ff.s1.winner&&ff.s1.winner[0]===pick[0]){ff.s1.winner=null;}
    else{ff.s1.winner=pick;}
    ff.champ=null;
  }
  if(semi===2&&ff.s2){
    if(ff.s2.winner&&ff.s2.winner[0]===pick[0]){ff.s2.winner=null;}
    else{ff.s2.winner=pick;}
    ff.champ=null;
  }
  calcW();renderBrkPnl();renderBrk();
}
function advanceChamp(pick){
  var ff=brkState.ff;
  if(ff.champ&&ff.champ[0]===pick[0]){ff.champ=null;}
  else{ff.champ=pick;}
  calcW();renderBrkPnl();renderBrk();
}
function clearBracket(){initBracket();calcW();renderBrkPnl();renderBrk();}

function calcW(){
  brkWinnings=0;
  ['East','South','West','Midwest'].forEach(function(rgn){
    var s=brkState[rgn];
    s.r64.forEach(function(g){if(g.winner&&isMine(g.winner[0]))brkWinnings+=PAYOUTS.r64;});
    s.r32.forEach(function(g){if(g&&g.winner&&isMine(g.winner[0]))brkWinnings+=PAYOUTS.r32;});
    s.s16.forEach(function(g){if(g&&g.winner&&isMine(g.winner[0]))brkWinnings+=PAYOUTS.s16;});
    if(s.e8&&s.e8.winner&&isMine(s.e8.winner[0]))brkWinnings+=PAYOUTS.e8;
  });
  var ff=brkState.ff;
  if(ff.s1&&ff.s1.winner&&isMine(ff.s1.winner[0]))brkWinnings+=PAYOUTS.ff;
  if(ff.s2&&ff.s2.winner&&isMine(ff.s2.winner[0]))brkWinnings+=PAYOUTS.ff;
  if(ff.champ&&isMine(ff.champ[0]))brkWinnings+=PAYOUTS.champ;
}

// ===== BRACKET PANEL =====
function renderBrkPnl(){
  var el=document.getElementById('brkPnl');
  var pnl=brkWinnings-CHRIS_SPENT;
  var h='<div class="bpg">';
  PAYOUT_LABELS.forEach(function(p){h+='<div class="bpc"><div class="bpr">'+p.label+'</div><div class="bpa">$'+Math.round(PAYOUTS[p.key])+'</div></div>';});
  h+='<div class="bpc"><div class="bpr">Won</div><div class="bpa" style="color:#22c55e">$'+Math.round(brkWinnings)+'</div></div>';
  h+='<div class="bpc bpcx"><div class="bpr">P&L</div><div class="bpa '+(pnl>=0?'pos':'neg')+'">$'+(pnl>=0?'+':'')+Math.round(pnl)+'</div></div>';
  h+='</div>';
  h+='<div class="bpl">Spent: <b>$'+CHRIS_SPENT+'</b> | Won: <b style="color:#22c55e">$'+Math.round(brkWinnings)+'</b> | P&L: <b style="color:'+(pnl>=0?'#22c55e':'#ef4444')+'">$'+(pnl>=0?'+':'')+Math.round(pnl)+'</b></div>';
  el.innerHTML=h;
}

// ===== BRACKET RENDER (AuctionCutta-style mirrored layout) =====
function teamInfo(team){
  if(!team)return null;
  var a=null;
  for(var i=0;i<AUCTION.length;i++){if(AUCTION[i].team===team[0]){a=AUCTION[i];break;}}
  return{name:team[0],seed:team[1],owner:a?a.owner+'  and Co':'',price:a?'$'+a.price:''};
}

function slot(team,cls,attr){
  if(!team)return '<div class="brk-tm empty"><div class="tm-info"><div class="tm-name">TBD</div></div></div>';
  var t=teamInfo(team);
  var m=isMine(team[0])?'mine':'';
  return '<div class="brk-tm '+m+' '+cls+'" '+attr+'><span class="tm-seed">'+t.seed+'</span><div class="tm-info"><div class="tm-name">'+t.name+'</div><div class="tm-owner">'+t.owner+'</div></div><span class="tm-price">'+t.price+'</span></div>';
}

function slotAdv(team,cls,attr){
  if(!team)return '<div class="brk-tm empty"><div class="tm-info"><div class="tm-name">TBD</div></div></div>';
  var m=isMine(team[0])?'mine':'';
  return '<div class="brk-tm '+m+' '+cls+'" '+attr+'><span class="tm-seed">'+team[1]+'</span><div class="tm-info"><div class="tm-name">'+team[0]+'</div></div></div>';
}

function renderRegion(rgn,mirrored){
  var s=brkState[rgn];
  var dir=mirrored?'rtl':'ltr';
  var rounds=['r64','r32','s16','e8'];
  var labels=['1ST ROUND','2ND ROUND','SWEET 16','ELITE 8'];
  if(mirrored){rounds.reverse();labels.reverse();}

  var h='<div class="brk-rgn-title '+rgn.toLowerCase()+'">'+rgn+'</div>';
  h+='<div class="brk-hdrs '+dir+'">';
  labels.forEach(function(l){h+='<div>'+l+'</div>';});
  h+='</div>';
  h+='<div class="brk-cols '+dir+'">';

  // Build each round column
  var colOrder=mirrored?['e8','s16','r32','r64']:['r64','r32','s16','e8'];
  colOrder.forEach(function(rnd){
    h+='<div class="brk-col">';
    if(rnd==='r64'){
      s.r64.forEach(function(g,gi){
        var wa=g.winner&&g.winner[0]===g.a[0],wb=g.winner&&g.winner[0]===g.b[0];
        h+='<div class="brk-mu">';
        h+=slot(g.a,wa?'pk':'','data-adv="'+esc(rgn)+'|r64|'+gi+'|'+esc(g.a[0])+'|'+g.a[1]+'"');
        h+=slot(g.b,wb?'pk':'','data-adv="'+esc(rgn)+'|r64|'+gi+'|'+esc(g.b[0])+'|'+g.b[1]+'"');
        h+='</div>';
      });
    } else if(rnd==='r32'){
      for(var i=0;i<4;i++){
        var g=s.r32[i];
        var mt=(i===0)?'12':'24';
        h+='<div class="brk-mu" style="margin-top:'+mt+'px">';
        if(g){
          var wa=g.winner&&g.a&&g.winner[0]===g.a[0],wb=g.winner&&g.b&&g.winner[0]===g.b[0];
          h+=g.a?slotAdv(g.a,wa?'pk':'','data-adv="'+esc(rgn)+'|r32|'+i+'|'+esc(g.a[0])+'|'+g.a[1]+'"'):slot(null,'','');
          h+=g.b?slotAdv(g.b,wb?'pk':'','data-adv="'+esc(rgn)+'|r32|'+i+'|'+esc(g.b[0])+'|'+g.b[1]+'"'):slot(null,'','');
        } else {h+=slot(null,'','');h+=slot(null,'','');}
        h+='</div>';
      }
    } else if(rnd==='s16'){
      for(var i=0;i<2;i++){
        var g=s.s16[i];
        var mt=(i===0)?'40':'60';
        h+='<div class="brk-mu" style="margin-top:'+mt+'px">';
        if(g){
          var wa=g.winner&&g.a&&g.winner[0]===g.a[0],wb=g.winner&&g.b&&g.winner[0]===g.b[0];
          h+=g.a?slotAdv(g.a,wa?'pk':'','data-adv="'+esc(rgn)+'|s16|'+i+'|'+esc(g.a[0])+'|'+g.a[1]+'"'):slot(null,'','');
          h+=g.b?slotAdv(g.b,wb?'pk':'','data-adv="'+esc(rgn)+'|s16|'+i+'|'+esc(g.b[0])+'|'+g.b[1]+'"'):slot(null,'','');
        } else {h+=slot(null,'','');h+=slot(null,'','');}
        h+='</div>';
      }
    } else if(rnd==='e8'){
      h+='<div class="brk-mu" style="margin-top:100px">';
      if(s.e8){
        var wa=s.e8.winner&&s.e8.a&&s.e8.winner[0]===s.e8.a[0],wb=s.e8.winner&&s.e8.b&&s.e8.winner[0]===s.e8.b[0];
        h+=s.e8.a?slotAdv(s.e8.a,wa?'pk':'','data-adv="'+esc(rgn)+'|e8|0|'+esc(s.e8.a[0])+'|'+s.e8.a[1]+'"'):slot(null,'','');
        h+=s.e8.b?slotAdv(s.e8.b,wb?'pk':'','data-adv="'+esc(rgn)+'|e8|0|'+esc(s.e8.b[0])+'|'+s.e8.b[1]+'"'):slot(null,'','');
      } else {h+=slot(null,'','');h+=slot(null,'','');}
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function renderBrk(){
  var el=document.getElementById('bracketContent');
  var ff=brkState.ff;
  var h='<div class="brk-wrap">';

  // Left half: South (top), East (bottom)
  h+='<div class="brk-half">';
  h+='<div class="brk-rgn">'+renderRegion('South',false)+'</div>';
  h+='<div class="brk-rgn">'+renderRegion('East',false)+'</div>';
  h+='</div>';

  // Right half: West (top), Midwest (bottom)
  h+='<div class="brk-half">';
  h+='<div class="brk-rgn">'+renderRegion('West',true)+'</div>';
  h+='<div class="brk-rgn">'+renderRegion('Midwest',true)+'</div>';
  h+='</div>';

  // Final Four (full width center)
  h+='<div class="brk-ff-center">';
  h+='<div class="brk-ff-label">Final Four</div>';
  h+='<div class="brk-ff-semis">';

  // Semi 1: South vs East
  h+='<div class="brk-ff-game"><div class="brk-ff-game-label">South vs East</div>';
  if(ff.s1){
    var wa=ff.s1.winner&&ff.s1.a&&ff.s1.winner[0]===ff.s1.a[0],wb=ff.s1.winner&&ff.s1.b&&ff.s1.winner[0]===ff.s1.b[0];
    h+=ff.s1.a?slotAdv(ff.s1.a,wa?'pk':'','data-ff="1|'+esc(ff.s1.a[0])+'|'+ff.s1.a[1]+'"'):slot(null,'','');
    h+=ff.s1.b?slotAdv(ff.s1.b,wb?'pk':'','data-ff="1|'+esc(ff.s1.b[0])+'|'+ff.s1.b[1]+'"'):slot(null,'','');
  } else {h+=slot(null,'','');h+=slot(null,'','');}
  h+='</div>';
  h+='<div class="brk-ff-vs">VS</div>';

  // Semi 2: West vs Midwest
  h+='<div class="brk-ff-game"><div class="brk-ff-game-label">West vs Midwest</div>';
  if(ff.s2){
    var wa=ff.s2.winner&&ff.s2.a&&ff.s2.winner[0]===ff.s2.a[0],wb=ff.s2.winner&&ff.s2.b&&ff.s2.winner[0]===ff.s2.b[0];
    h+=ff.s2.a?slotAdv(ff.s2.a,wa?'pk':'','data-ff="2|'+esc(ff.s2.a[0])+'|'+ff.s2.a[1]+'"'):slot(null,'','');
    h+=ff.s2.b?slotAdv(ff.s2.b,wb?'pk':'','data-ff="2|'+esc(ff.s2.b[0])+'|'+ff.s2.b[1]+'"'):slot(null,'','');
  } else {h+=slot(null,'','');h+=slot(null,'','');}
  h+='</div></div>';

  // Championship
  h+='<div class="brk-champ-box"><div class="brk-champ-label">Championship</div>';
  if(ff.s1&&ff.s1.winner&&ff.s2&&ff.s2.winner){
    var c1=ff.champ&&ff.champ[0]===ff.s1.winner[0],c2=ff.champ&&ff.champ[0]===ff.s2.winner[0];
    h+=slotAdv(ff.s1.winner,c1?'pk':'','data-champ="'+esc(ff.s1.winner[0])+'|'+ff.s1.winner[1]+'"');
    h+=slotAdv(ff.s2.winner,c2?'pk':'','data-champ="'+esc(ff.s2.winner[0])+'|'+ff.s2.winner[1]+'"');
  } else {h+=slot(null,'','');h+=slot(null,'','');}
  if(ff.champ){
    h+='<div class="brk-champ-winner">'+ff.champ[0]+'</div>';
  }
  h+='</div>';
  h+='</div>';

  h+='</div>';
  el.innerHTML=h;
}

// ===== EVENT DELEGATION =====
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-adv]');
  if(el){var p=el.getAttribute('data-adv').split('|');advanceTeam(decEsc(p[0]),p[1],parseInt(p[2]),[decEsc(p[3]),parseInt(p[4])]);return;}
  var el2=e.target.closest('[data-ff]');
  if(el2){var p=el2.getAttribute('data-ff').split('|');advanceFF(parseInt(p[0]),[decEsc(p[1]),parseInt(p[2])]);return;}
  var el3=e.target.closest('[data-champ]');
  if(el3){var p=el3.getAttribute('data-champ').split('|');advanceChamp([decEsc(p[0]),parseInt(p[1])]);return;}
});

</script>
