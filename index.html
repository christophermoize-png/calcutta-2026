<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Calcutta War Room</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1a;--bg2:#101726;--bg3:#172033;--card:#131c2b;--card2:#1a2638;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);
  --accent:#29c6ff;--accent2:#57d4ff;--accent-glow:rgba(41,198,255,0.12);
  --green:#22c55e;--green2:rgba(34,197,94,0.12);--green3:rgba(34,197,94,0.28);
  --red:#ef4444;--red2:rgba(239,68,68,0.12);
  --yellow:#f0c040;--purple:#8b5cf6;--blue:#3b82f6;
  --text:#e7edf7;--text2:#a6b2c8;--text3:#6f7c94;--white:#f8fbff;
  --shadow-sm:0 1px 0 rgba(255,255,255,0.03),0 6px 18px rgba(0,0,0,0.28);
  --shadow-md:0 1px 0 rgba(255,255,255,0.03),0 10px 28px rgba(0,0,0,0.34);
  --shadow-lg:0 1px 0 rgba(255,255,255,0.04),0 18px 42px rgba(0,0,0,0.42);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --font-display:'Oswald',sans-serif;--font-body:'Source Sans 3',sans-serif;
  --orange:var(--accent);--orange2:var(--accent2);--orange-glow:var(--accent-glow);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);padding:0;font-size:13px;
  background-image:
    radial-gradient(ellipse 80% 60% at 15% 10%,rgba(41,198,255,0.06) 0%,transparent 55%),
    radial-gradient(ellipse 70% 50% at 85% 90%,rgba(139,92,246,0.05) 0%,transparent 55%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E")}

/* Setup / Landing */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;
  background:radial-gradient(ellipse at 50% 30%,rgba(41,198,255,0.08) 0%,transparent 55%),
  radial-gradient(ellipse at 70% 70%,rgba(139,92,246,0.06) 0%,transparent 50%)}
#setup.hidden{display:none}

/* Logo lockup */
.slogo-wrap{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.slogo-mark{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--white);box-shadow:0 4px 20px rgba(41,198,255,0.3),inset 0 1px 0 rgba(255,255,255,0.15);letter-spacing:1px}
.slogo{font-family:var(--font-display);font-size:34px;font-weight:700;color:var(--white);letter-spacing:4px;text-transform:uppercase}
.slogo span{color:var(--accent)}
.ssub{font-size:13px;color:var(--text2);margin-bottom:32px;letter-spacing:0.5px}
.sbtn{background:linear-gradient(135deg,var(--accent),#1da6dd);color:var(--white);font-family:var(--font-display);font-size:18px;font-weight:600;padding:16px 56px;border:none;border-radius:var(--radius-sm);cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all 0.2s;box-shadow:0 4px 20px rgba(41,198,255,0.3)}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(41,198,255,0.4)}
.sbtn:active{transform:translateY(0);box-shadow:0 2px 12px rgba(41,198,255,0.2)}


/* Logo */
.logo-landing{height:100px;width:auto;display:block;margin:0 auto 8px;filter:drop-shadow(0 4px 24px rgba(41,198,255,0.25))}
.logo-header{height:36px;width:auto;filter:drop-shadow(0 2px 8px rgba(41,198,255,0.15));margin-right:4px}

/* War Room Shell */
#warroom{display:none;padding:0;max-width:1200px;margin:0 auto}
#warroom.active{display:block}
.hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border2);
  background:linear-gradient(180deg,rgba(41,198,255,0.03) 0%,transparent 100%)}
.hdr-inner{display:flex;align-items:center;gap:10px}
.hdr-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--white);box-shadow:0 2px 10px rgba(41,198,255,0.2)}
.hdr h1{font-family:var(--font-display);font-size:20px;font-weight:600;letter-spacing:3px;color:var(--white);text-transform:uppercase}
.hdr h1 span{color:var(--accent)}
.hdr p{font-size:11px;color:var(--text3);margin-top:3px;letter-spacing:0.3px}

/* Tabs */
.ntabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--bg2);padding:0 16px}
.ntab{padding:12px 20px;font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;text-transform:uppercase;letter-spacing:1.5px;transition:color 0.15s,border-color 0.15s}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent)}
.ntab:hover:not(.active){color:var(--text)}
.page{display:none;padding:16px}.page.active{display:block}

/* Dashboard */
.dash{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.dash-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-md);padding:14px;text-align:center;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:border-color 0.2s,box-shadow 0.2s}
.dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--purple));opacity:0.5}
.dash-card::after{content:'';position:absolute;top:2px;left:0;right:0;height:1px;background:rgba(255,255,255,0.04)}
.dash-val{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--white);line-height:1.1}
.dash-dim{font-size:16px;color:var(--text3);font-weight:400}
.dash-lbl{font-family:var(--font-display);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}
.dash-sub{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.3}
.dash-link{cursor:pointer}.dash-link:hover{border-color:var(--accent);box-shadow:var(--shadow-md),0 0 16px rgba(41,198,255,0.08)}
@media(max-width:700px){.dash{grid-template-columns:repeat(2,1fr)}}
.gn{color:var(--green)}.rd{color:var(--red)}

/* Summary cards */
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:10px 0;box-shadow:var(--shadow-sm);position:relative}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,0.04);border-radius:var(--radius-md) var(--radius-md) 0 0}
.sc h3{font-family:var(--font-display);font-size:14px;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin:10px 0}
.ss{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center;transition:border-color 0.15s}
.ss:hover{border-color:var(--border2)}
.ss .sv{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--accent)}
.ss .sl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.sr:last-child{border:none}.sr .sn{color:var(--white);font-weight:700}.sr .sd2{color:var(--text3);font-size:10px}
.sr .sp{color:var(--accent);font-weight:700}.sr .se{font-size:10px}
.gc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:6px}
.gc h4{font-size:12px;color:var(--text);margin-bottom:4px}.gc.me{border-left:3px solid var(--green)}.gc.me h4{color:var(--green)}

/* Bracket payout panel */
.bpnl{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-md);padding:14px 16px;margin:10px 0;position:sticky;top:0;z-index:10;
  box-shadow:var(--shadow-lg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.bpnl::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(41,198,255,0.15),transparent);border-radius:var(--radius-md) var(--radius-md) 0 0}
.bpg{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:8px}
.bpc{text-align:center;padding:6px 4px;border-radius:var(--radius-sm);background:var(--bg)}
.bpc .bpr{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.bpc .bpa{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--accent)}
.bpcx{background:var(--accent-glow);border:1px solid rgba(41,198,255,0.2)}
.bpa.pos{color:var(--green)}.bpa.neg{color:var(--red)}
.bpl{display:flex;justify-content:center;gap:16px;font-size:11px;color:var(--text2)}

/* Bracket layout */
.brk-wrap{display:grid;grid-template-columns:1fr 40px 1fr;gap:0;overflow-x:auto;min-width:940px}
.brk-half{display:flex;flex-direction:column;gap:0}
.brk-center-strip{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:40px 0}
.brk-center-line{flex:1;width:2px;border-left:2px dashed rgba(41,198,255,0.2)}
.brk-center-label{font-family:var(--font-display);font-size:10px;color:var(--accent);letter-spacing:2px;text-align:center;padding:12px 0;opacity:0.6}
.brk-rgn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 8px;margin:4px;box-shadow:var(--shadow-sm)}
.brk-rgn-title{font-family:var(--font-display);font-size:20px;font-weight:700;text-align:center;padding:10px 0 6px;letter-spacing:3px;text-transform:uppercase}
.brk-rgn-title.south{color:var(--yellow)}.brk-rgn-title.east{color:var(--accent)}.brk-rgn-title.west{color:var(--green)}.brk-rgn-title.midwest{color:var(--purple)}
.brk-hdrs{display:grid;gap:2px;font-family:var(--font-display);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;text-align:center;padding:0 2px 6px}
.brk-hdrs.ltr{grid-template-columns:2fr 1.5fr 1fr 1fr}
.brk-hdrs.rtl{grid-template-columns:1fr 1fr 1.5fr 2fr}
.brk-cols{display:grid;gap:2px}
.brk-cols.ltr{grid-template-columns:2fr 1.5fr 1fr 1fr}
.brk-cols.rtl{grid-template-columns:1fr 1fr 1.5fr 2fr}
.brk-col{display:flex;flex-direction:column;gap:1px}
.brk-mu{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px;margin-bottom:2px}
.brk-tm{display:flex;align-items:center;gap:4px;padding:5px 6px;border-radius:4px;cursor:pointer;transition:all 0.18s;position:relative;border:1px solid transparent}
.brk-tm:hover{background:var(--accent-glow);border-color:rgba(41,198,255,0.15)}
.brk-tm.pk{background:rgba(41,198,255,0.10);border:1px solid rgba(41,198,255,0.25);box-shadow:0 0 8px rgba(41,198,255,0.08);animation:pickPop 0.25s ease-out}
@keyframes pickPop{0%{transform:scale(0.96);opacity:0.7}100%{transform:scale(1);opacity:1}}
.brk-tm.mine{background:var(--green2);border:1px solid var(--green3);box-shadow:inset 0 0 0 1px rgba(34,197,94,0.06)}
.brk-tm.mine.pk{background:rgba(34,197,94,0.16);border-color:rgba(34,197,94,0.4);box-shadow:0 0 10px rgba(34,197,94,0.1)}
.brk-tm.empty{opacity:0.2;cursor:default}
.brk-tm .tm-seed{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0;background:rgba(255,255,255,0.06);color:var(--text3)}
.brk-tm.mine .tm-seed{background:rgba(34,197,94,0.2);color:var(--green)}
.brk-tm .tm-info{flex:1;min-width:0;overflow:hidden}
.brk-tm .tm-name{font-size:10px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brk-tm.mine .tm-name{color:var(--green)}
.brk-tm .tm-owner{font-size:7px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brk-tm.mine .tm-owner{color:rgba(34,197,94,0.5)}
.brk-tm .tm-price{font-size:10px;font-weight:800;color:var(--accent);flex-shrink:0;margin-left:auto}
.brk-tm.empty .tm-name{color:#1e2738;font-style:italic;font-weight:400}

/* Final Four */
.brk-ff-center{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:14px;
  background:radial-gradient(ellipse at 50% 50%,rgba(41,198,255,0.04) 0%,transparent 70%)}
.brk-ff-label{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--accent);letter-spacing:3px;text-transform:uppercase}
.brk-ff-semis{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;width:100%;max-width:600px}
.brk-ff-game{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px;box-shadow:var(--shadow-sm)}
.brk-ff-game-label{font-family:var(--font-display);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;text-align:center}
.brk-ff-vs{color:var(--text3);font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:2px}
.brk-champ-box{background:linear-gradient(135deg,rgba(41,198,255,0.06),rgba(139,92,246,0.06));border:2px solid rgba(41,198,255,0.2);border-radius:var(--radius-md);padding:14px;width:100%;max-width:280px;box-shadow:0 0 24px rgba(41,198,255,0.06)}
.brk-champ-label{font-family:var(--font-display);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:6px;font-weight:600}
.brk-champ-winner{text-align:center;font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--white);padding:8px 0;background:rgba(41,198,255,0.08);border-radius:var(--radius-sm);margin-top:6px;letter-spacing:2px}

.brk-clear-row{text-align:right;padding:6px 8px}
.ts-pnl{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-md);padding:12px 16px;margin:0 0 6px;box-shadow:var(--shadow-sm)}
.ts-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.ts-label{font-family:var(--font-display);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-right:4px;min-width:70px}
.ts-chip{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;transition:all 0.15s}
.ts-chip.alive{background:var(--green2);color:var(--green);border:1px solid var(--green3)}
.ts-chip.elim{background:var(--red2);color:var(--red);border:1px solid rgba(239,68,68,0.2);opacity:0.6;text-decoration:line-through}
.ts-chip.pending{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(41,198,255,0.15)}
.brk-clear-btn{background:var(--red2);color:var(--red);border:1px solid rgba(239,68,68,0.25);padding:6px 16px;border-radius:var(--radius-sm);font-family:var(--font-display);font-size:10px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all 0.15s}
.brk-clear-btn:hover{background:rgba(239,68,68,0.2);transform:translateY(-1px)}
.brk-clear-btn:active{transform:translateY(0)}

/* Games */
.gm-day{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--accent);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid rgba(41,198,255,0.12);letter-spacing:1.5px;text-transform:uppercase}
.gm-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin:6px 0;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:all 0.18s;box-shadow:var(--shadow-sm)}
.gm-card.mine{border-color:var(--green3);background:var(--green2)}
.gm-card.gm-won{border-color:rgba(34,197,94,0.5);background:rgba(34,197,94,0.08)}
.gm-card.gm-lost{border-color:rgba(239,68,68,0.3);background:var(--red2);opacity:0.6}
.gm-card.gm-live{border-color:rgba(34,197,94,0.5);animation:livepulse 2s ease-in-out infinite}
@keyframes livepulse{0%,100%{box-shadow:var(--shadow-sm)}50%{box-shadow:0 0 16px 2px rgba(34,197,94,0.12)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.gm-live-badge{font-family:var(--font-display);font-size:9px;font-weight:600;color:var(--white);background:var(--red);padding:2px 7px;border-radius:3px;display:inline-block;letter-spacing:1px;margin-bottom:2px;animation:pulse 1.2s infinite}
.gm-left{flex:1}
.gm-matchup{font-size:13px;font-weight:700;color:var(--white)}
.gm-matchup .seed{color:var(--text3);font-size:11px;font-weight:600}
.gm-meta{font-size:10px;color:var(--text3);margin-top:3px}
.gm-right{text-align:right;min-width:70px}
.gm-time{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--accent);letter-spacing:0.5px}
.gm-tv{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.gm-undo{font-size:9px;color:var(--text3);cursor:pointer;margin-top:2px;text-decoration:underline;opacity:0.5;transition:opacity 0.15s}
.gm-undo:hover{opacity:1;color:var(--accent)}
/* Team logos */
.tm-logo{width:20px;height:20px;object-fit:contain;border-radius:2px;flex-shrink:0;vertical-align:middle}
.tm-logo-sm{width:16px;height:16px;object-fit:contain;border-radius:2px;flex-shrink:0;vertical-align:middle}
.tm-logo-lg{width:24px;height:24px;object-fit:contain;border-radius:2px;flex-shrink:0}
.gm-logos{display:flex;align-items:center;gap:6px;margin-bottom:2px}
/* Insight feed */
.feed{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.feed-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);transition:border-color 0.15s}
.feed-card:hover{border-color:var(--border2)}
.feed-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.feed-icon.fi-green{background:var(--green2);color:var(--green)}
.feed-icon.fi-accent{background:var(--accent-glow);color:var(--accent)}
.feed-icon.fi-yellow{background:rgba(240,192,64,0.12);color:var(--yellow)}
.feed-icon.fi-red{background:var(--red2);color:var(--red)}
.feed-icon.fi-purple{background:rgba(139,92,246,0.12);color:var(--purple)}
.feed-body{flex:1;min-width:0}
.feed-title{font-size:12px;font-weight:700;color:var(--white)}
.feed-sub{font-size:10px;color:var(--text3);margin-top:1px}
.feed-val{font-family:var(--font-display);font-size:16px;font-weight:600;flex-shrink:0;text-align:right}

/* Leaderboard */
.lb-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);margin:10px 0;overflow:hidden;transition:all 0.18s;box-shadow:var(--shadow-sm)}
.lb-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md)}
.lb-card.lb-me{border-color:var(--green3);box-shadow:0 0 16px rgba(34,197,94,0.06)}
.lb-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;transition:background 0.15s}
.lb-hdr:hover{background:rgba(255,255,255,0.015)}
.lb-rank{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--text3);width:40px;text-align:center}
.lb-card.lb-me .lb-rank{color:var(--green)}
.lb-name{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--white);text-transform:uppercase;letter-spacing:1px}
.lb-card.lb-me .lb-name{color:var(--green)}
.lb-stats{display:flex;gap:16px;align-items:center}
.lb-stat{text-align:center}
.lb-stat-val{font-family:var(--font-display);font-size:16px;font-weight:600}
.lb-stat-lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.lb-detail{padding:0 16px 14px;display:none}
.lb-detail.open{display:block}
.lb-team-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.lb-team-row:last-child{border:none}
.lb-team-name{color:var(--text);font-weight:600}
.lb-team-elim{color:var(--text3);text-decoration:line-through;opacity:0.5}
.lb-team-alive{color:var(--green)}.lb-team-pending{color:var(--accent)}
.lb-team-price{color:var(--accent);font-weight:700}
.lb-team-status{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px}
.lb-team-status.alive{background:var(--green2);color:var(--green)}
.lb-team-status.elim{background:var(--red2);color:var(--red)}
.lb-team-status.pending{background:var(--accent-glow);color:var(--accent)}

@media(max-width:950px){.brk-wrap{min-width:unset;grid-template-columns:1fr}.brk-center-strip{display:none}.brk-ff-semis{grid-template-columns:1fr}.bpg{grid-template-columns:repeat(4,1fr)}}
</style>

function saveGameState(){
  try{
    var state=GAMES.map(function(g){return {result:g.result,score:g.score,payout:g.payout,time:g.time};});
    localStorage.setItem('cwr_games',JSON.stringify(state));
  }catch(e){}
}
function loadGameState(){
  try{
    var saved=localStorage.getItem('cwr_games');
    if(!saved) return;
    var state=JSON.parse(saved);
    state.forEach(function(s,i){
      if(i<GAMES.length && s.result){
        GAMES[i].result=s.result;
        GAMES[i].score=s.score;
        GAMES[i].payout=s.payout;
        GAMES[i].time=s.time||GAMES[i].time;
      }
    });
  }catch(e){}
}

  try{

    }
  }catch(e){console.error('Auto-enter error:',e);}
}
if(document.readyState==='loading'){

function getScoreURLs(){

  return [

  ];
}

function nameMatch(espnName,ourNames){
  var n=espnName.toLowerCase();
  for(var i=0;i<ourNames.length;i++){
    var m=ourNames[i].toLowerCase();
    if(n.indexOf(m)>=0||m.indexOf(n)>=0) return true;
    // Handle partial matches
    if(m==='mcneese'&&n.indexOf('mcneese')>=0) return true;
    if(m==='liu'&&(n.indexOf('long island')>=0||n.indexOf('liu')>=0)) return true;
    if(m==='howard'&&n.indexOf('howard')>=0) return true;
    if(m==='miami'&&n.indexOf('miami')>=0&&n.indexOf('ohio')<0) return true;
    if(m==="saint mary's"&&n.indexOf('saint mary')>=0) return true;
    if(m==="st. john's"&&(n.indexOf('st. john')>=0||n.indexOf('saint john')>=0)) return true;
  }
  return false;
}

    }
    var allEvents=[];
    results.forEach(function(data){
      if(data.events) allEvents=allEvents.concat(data.events);
    });
    var changed=false;
    allEvents.forEach(function(ev){
      var comps=ev.competitions&&ev.competitions[0];
      if(!comps) return;
      var teams=comps.competitors||[];
      if(teams.length<2) return;
      var home=teams.find(function(t){return t.homeAway==='home';});
      var away=teams.find(function(t){return t.homeAway==='away';});
      if(!home||!away) return;

      var homeName=home.team.displayName||home.team.shortDisplayName||home.team.name||'';
      var awayName=away.team.displayName||away.team.shortDisplayName||away.team.name||'';
      var homeScore=parseInt(home.score)||0;
      var awayScore=parseInt(away.score)||0;
      var status=comps.status||{};
      var state=status.type?status.type.name:'';
      var clock=status.displayClock||'';
      var period=status.period||0;

      GAMES.forEach(function(g,idx){
        if(g.result==='W'||g.result==='L') return;
        var ourTeamName=g.espn[0];
        var oppTeamName=g.espn[1];
        var ourIsHome=nameMatch(homeName,[ourTeamName]);
        var ourIsAway=nameMatch(awayName,[ourTeamName]);
        var oppIsHome=nameMatch(homeName,[oppTeamName]);
        var oppIsAway=nameMatch(awayName,[oppTeamName]);

        if((ourIsHome&&oppIsAway)||(ourIsAway&&oppIsHome)){
          var ourScore=ourIsHome?homeScore:awayScore;
          var oppScore=ourIsHome?awayScore:homeScore;

          if(state==='STATUS_FINAL'){
            g.result=ourScore>oppScore?'W':'L';
            g.score=ourScore+'-'+oppScore;
            g.payout=g.result==='W'?85.82:0;
            g.time='FINAL';
            g.live=null;
            changed=true;
            saveGameState();
          } else if(state==='STATUS_IN_PROGRESS'){
            g.live={our:ourScore,opp:oppScore,clock:clock,period:period};
            g.score=ourScore+'-'+oppScore;
            changed=true;
          } else if(state==='STATUS_HALFTIME'){
            g.live={our:ourScore,opp:oppScore,clock:'HALF',period:2};
            g.score=ourScore+'-'+oppScore;
            changed=true;
          }
        }
      });

      // Track ALL auction team results for leaderboard
      if(state==='STATUS_FINAL'){
        AUCTION.forEach(function(a){
          if(ALL_RESULTS[a.team]) return; // already tracked
          var aHome=nameMatch(homeName,[a.team]);
          var aAway=nameMatch(awayName,[a.team]);
          if(aHome||aAway){
            var aScore=aHome?homeScore:awayScore;
            var oppScore2=aHome?awayScore:homeScore;
            ALL_RESULTS[a.team]=aScore>oppScore2?'W':'L';
            changed=true;
          }
        });
        saveAllResults();
      }
    });
    if(changed){
      renderGames();
      renderSummary();
      if(document.getElementById('pg-league').classList.contains('active')) renderLeague();
    }
  }).catch(function(err){
    console.log('Score fetch failed:',err.message);
  });
}

function startScorePolling(){
  fetchScores();
  scoreInterval=setInterval(fetchScores,30000); // every 30 seconds
}


function calcGamePnl(){
  var won=0;
  GAMES.forEach(function(g){if(g.result==='W')won+=g.payout;});
  return won;
}

function markResult(idx,result){
  GAMES[idx].result=result;
  GAMES[idx].payout=result==='W'?85.82:0;
  GAMES[idx].time='FINAL';
  // Update global results
  ALL_RESULTS[GAMES[idx].team]=result==='W'?'W':'L';
  saveGameState();
  renderGames();
  renderSummary();
}

function undoResult(idx){
  GAMES[idx].result=null;
  GAMES[idx].payout=0;
  GAMES[idx].score='';
  GAMES[idx].live=null;
  // Remove from global results
  delete ALL_RESULTS[GAMES[idx].team];
  saveGameState();
  saveAllResults();
  renderGames();
  renderSummary();
}

var ALL_RESULTS={};

function loadAllResults(){
  try{
    var saved=localStorage.getItem('cwr_all_results');
    if(saved) ALL_RESULTS=JSON.parse(saved);
  }catch(e){}
  // Also sync from GAMES array
  GAMES.forEach(function(g){
    if(g.result==='W') ALL_RESULTS[g.team]='W';
    else if(g.result==='L') ALL_RESULTS[g.team]='L';
  });
}
function saveAllResults(){
  try{localStorage.setItem('cwr_all_results',JSON.stringify(ALL_RESULTS));}catch(e){}
}

  h+='<div class="ss"><div class="sv">$'+Math.round(me.ev)+'</div><div class="sl">Live EV</div></div>';
  h+='<div class="ss"><div class="sv '+(edge>=0?'gn':'rd')+'">$'+(edge>=0?'+':'')+Math.round(edge)+'</div><div class="sl">Edge</div></div>';
  h+='<div class="ss"><div class="sv">'+me.count+'</div><div class="sl">Teams</div></div>';
  h+='<div class="ss"><div class="sv">'+(me.spend>0?Math.round((me.ev/me.spend-1)*100):'--')+'%</div><div class="sl">ROI</div></div>';
  h+='</div>';
  me.teams.sort(function(a,b){return b.ev-a.ev;});
  me.teams.forEach(function(t){
    var d2=t.ev-t.price;
    h+='<div class="sr"><div>'+logoImg(t.team,'tm-logo-sm')+' <span class="sn">'+t.team+'</span> <span class="sd2">('+t.seed+', '+t.region+')</span></div><div><span class="sp">$'+t.price+'</span> <span class="se '+(d2>=0?'gn':'rd')+'">EV $'+Math.round(t.ev)+' ('+(d2>=0?'+':'')+Math.round(d2)+')</span></div></div>';
  });
  h+='</div>';

  // Payouts
  h+='<div class="sc"><h3>Payout structure — $'+FINAL_POT.toLocaleString()+' pot</h3><div class="sg">';
  PAYOUT_LABELS.forEach(function(p){h+='<div class="ss"><div class="sv">$'+Math.round(PAYOUTS[p.key])+'</div><div class="sl">'+p.label+' ('+p.pct+')</div></div>';});
  h+='<div class="ss" style="background:rgba(240,192,64,0.08)"><div class="sv" style="color:var(--accent)">$'+Math.round(FINAL_POT*0.265)+'</div><div class="sl">Full run</div></div>';
  h+='</div></div>';

  // Break-even
  h+='<div class="sc"><h3>Break-even scenarios</h3><div style="font-size:11px;color:var(--text2);line-height:1.8">';
  h+='<strong style="color:var(--green)">Arizona FF:</strong> $'+Math.round(PAYOUTS.r64+PAYOUTS.r32+PAYOUTS.s16+PAYOUTS.e8+PAYOUTS.ff)+' (covers $1,000 + $459 profit)<br>';
  h+='<strong style="color:var(--green)">Louisville S16:</strong> $'+Math.round(PAYOUTS.r64+PAYOUTS.r32+PAYOUTS.s16)+' (covers $120 + $424 profit)<br>';
  h+='<strong style="color:var(--green)">Arizona FF + Louisville S16:</strong> $'+Math.round(PAYOUTS.r64*2+PAYOUTS.r32*2+PAYOUTS.s16*2+PAYOUTS.e8+PAYOUTS.ff)+' — nearly entire $2,009 back<br>';
  h+='<strong style="color:var(--green)">Arizona wins it all:</strong> $'+Math.round(PAYOUTS.r64+PAYOUTS.r32+PAYOUTS.s16+PAYOUTS.e8+PAYOUTS.ff+PAYOUTS.champ)+' from Arizona alone<br>';
  h+='<br>Any team that wins 1 game pays <strong>$'+Math.round(PAYOUTS.r64)+'</strong>. You have 11 teams.';
  h+='</div></div>';

  // All groups
  h+='<div class="sc"><h3>All groups comparison</h3>';
  var ga=[];for(var g in groups)ga.push({name:g,d:groups[g]});
  ga.sort(function(a,b){return(b.d.ev-b.d.spend)-(a.d.ev-a.d.spend);});
  ga.forEach(function(g){
    var isMe=g.name==='Chris';var e2=g.d.ev-g.d.spend;var eff=g.d.spend>0?Math.round(g.d.ev/g.d.spend*100):0;
    h+='<div class="gc'+(isMe?' me':'')+'"><h4>'+g.name+(isMe?' (YOU)':'')+' — $'+g.d.spend+' spent, '+g.d.count+' teams, EV $'+Math.round(g.d.ev)+' <span style="color:'+(e2>=0?'var(--green)':'var(--red)')+'">('+( e2>=0?'+':'')+Math.round(e2)+', '+eff+'%)</span></h4>';
    g.d.teams.sort(function(a,b){return b.price-a.price;});
    h+='<div style="font-size:9px;color:var(--text3)">'+g.d.teams.slice(0,4).map(function(t){return t.team+' $'+t.price;}).join(', ')+'</div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

// ===== BRACKET STATE =====
function initBracket(){
  brkState={};brkWinnings=0;
  ['East','South','West','Midwest'].forEach(function(rgn){
    var games=BRACKET[rgn];
    brkState[rgn]={
      r64:games.map(function(g){return{a:g[0],b:g[1],winner:null};}),
      r32:[null,null,null,null],s16:[null,null],e8:null,winner:null
    };
  });
  brkState.ff={s1:null,s2:null,champ:null};
}

function advanceTeam(rgn,round,gi,pick){
  var s=brkState[rgn];
  if(round==='r64'){
    // Toggle: if this team is already the winner, undo it
    if(s.r64[gi].winner&&s.r64[gi].winner[0]===pick[0]){
      s.r64[gi].winner=null;
      var ri=Math.floor(gi/2),sl=gi%2;
      if(s.r32[ri]){s.r32[ri][sl===0?'a':'b']=null;s.r32[ri].winner=null;clearDown(rgn,'r32',ri);}
    } else {
      s.r64[gi].winner=pick;
      var ri=Math.floor(gi/2),sl=gi%2;
      if(!s.r32[ri])s.r32[ri]={a:null,b:null,winner:null};
      s.r32[ri][sl===0?'a':'b']=pick;
      s.r32[ri].winner=null;clearDown(rgn,'r32',ri);
    }
  } else if(round==='r32'){
    if(s.r32[gi].winner&&s.r32[gi].winner[0]===pick[0]){
      s.r32[gi].winner=null;
      var si=Math.floor(gi/2),sl=gi%2;
      if(s.s16[si]){s.s16[si][sl===0?'a':'b']=null;s.s16[si].winner=null;clearDown(rgn,'s16',si);}
    } else {
      s.r32[gi].winner=pick;
      var si=Math.floor(gi/2),sl=gi%2;
      if(!s.s16[si])s.s16[si]={a:null,b:null,winner:null};
      s.s16[si][sl===0?'a':'b']=pick;
      s.s16[si].winner=null;clearDown(rgn,'s16',si);
    }
  } else if(round==='s16'){
    if(s.s16[gi].winner&&s.s16[gi].winner[0]===pick[0]){
      s.s16[gi].winner=null;
      if(s.e8){s.e8[gi===0?'a':'b']=null;s.e8.winner=null;}
      s.winner=null;clearFF();
    } else {
      s.s16[gi].winner=pick;
      if(!s.e8)s.e8={a:null,b:null,winner:null};
      s.e8[gi===0?'a':'b']=pick;
      s.e8.winner=null;s.winner=null;clearFF();
    }
  } else if(round==='e8'){
    if(s.e8.winner&&s.e8.winner[0]===pick[0]){
      s.e8.winner=null;s.winner=null;clearFF();
    } else {
      s.e8.winner=pick;s.winner=pick;updateFF();
    }
  }
  calcW();renderBrkPnl();renderBrk();
}

function clearDown(rgn,fr,idx){
  var s=brkState[rgn];
  if(fr==='r32'){var si=Math.floor(idx/2);if(s.s16[si])s.s16[si].winner=null;if(s.e8)s.e8.winner=null;s.winner=null;clearFF();}
  else if(fr==='s16'){if(s.e8)s.e8.winner=null;s.winner=null;clearFF();}
}
function clearFF(){brkState.ff={s1:null,s2:null,champ:null};}
function updateFF(){
  var ff=brkState.ff;ff.s1=null;ff.s2=null;ff.champ=null;
  var sw=brkState.South.winner,ew=brkState.East.winner;
  var ww=brkState.West.winner,mw=brkState.Midwest.winner;
  if(sw&&ew)ff.s1={a:sw,b:ew,winner:null};
  if(ww&&mw)ff.s2={a:ww,b:mw,winner:null};
}
function advanceFF(semi,pick){
  var ff=brkState.ff;
  if(semi===1&&ff.s1){
    if(ff.s1.winner&&ff.s1.winner[0]===pick[0]){ff.s1.winner=null;}
    else{ff.s1.winner=pick;}
    ff.champ=null;
  }
  if(semi===2&&ff.s2){
    if(ff.s2.winner&&ff.s2.winner[0]===pick[0]){ff.s2.winner=null;}
    else{ff.s2.winner=pick;}
    ff.champ=null;
  }
  calcW();renderBrkPnl();renderBrk();
}
function advanceChamp(pick){
  var ff=brkState.ff;
  if(ff.champ&&ff.champ[0]===pick[0]){ff.champ=null;}
  else{ff.champ=pick;}
  calcW();renderBrkPnl();renderBrk();
}
function clearBracket(){initBracket();calcW();renderBrkPnl();renderBrk();}

function calcW(){
  brkWinnings=0;
  ['East','South','West','Midwest'].forEach(function(rgn){
    var s=brkState[rgn];
    s.r64.forEach(function(g){if(g.winner&&isMine(g.winner[0]))brkWinnings+=PAYOUTS.r64;});
    s.r32.forEach(function(g){if(g&&g.winner&&isMine(g.winner[0]))brkWinnings+=PAYOUTS.r32;});
    s.s16.forEach(function(g){if(g&&g.winner&&isMine(g.winner[0]))brkWinnings+=PAYOUTS.s16;});
    if(s.e8&&s.e8.winner&&isMine(s.e8.winner[0]))brkWinnings+=PAYOUTS.e8;
  });
  var ff=brkState.ff;
  if(ff.s1&&ff.s1.winner&&isMine(ff.s1.winner[0]))brkWinnings+=PAYOUTS.ff;
  if(ff.s2&&ff.s2.winner&&isMine(ff.s2.winner[0]))brkWinnings+=PAYOUTS.ff;
  if(ff.champ&&isMine(ff.champ[0]))brkWinnings+=PAYOUTS.champ;
}

// ===== BRACKET PANEL =====
function renderBrkPnl(){
  var el=document.getElementById('brkPnl');
  var pnl=brkWinnings-CHRIS_SPENT;
  var h='<div class="bpg">';
  PAYOUT_LABELS.forEach(function(p){h+='<div class="bpc"><div class="bpr">'+p.label+'</div><div class="bpa">$'+Math.round(PAYOUTS[p.key])+'</div></div>';});
  h+='<div class="bpc"><div class="bpr">Won</div><div class="bpa" style="color:var(--green)">$'+Math.round(brkWinnings)+'</div></div>';
  h+='<div class="bpc bpcx"><div class="bpr">P&L</div><div class="bpa '+(pnl>=0?'pos':'neg')+'">$'+(pnl>=0?'+':'')+Math.round(pnl)+'</div></div>';
  h+='</div>';
  h+='<div class="bpl">Spent: <b>$'+CHRIS_SPENT+'</b> | Won: <b style="color:var(--green)">$'+Math.round(brkWinnings)+'</b> | P&L: <b style="color:'+(pnl>=0?'var(--green)':'var(--red)')+'">$'+(pnl>=0?'+':'')+Math.round(pnl)+'</b></div>';
  el.innerHTML=h;
}

// ===== BRACKET RENDER (AuctionCutta-style mirrored layout) =====
function teamInfo(team){
  if(!team)return null;
  var a=null;
  for(var i=0;i<AUCTION.length;i++){if(AUCTION[i].team===team[0]){a=AUCTION[i];break;}}
  return{name:team[0],seed:team[1],owner:a?a.owner+'  and Co':'',price:a?'$'+a.price:''};
}

function slot(team,cls,attr){
  if(!team)return '<div class="brk-tm empty"><div class="tm-info"><div class="tm-name">TBD</div></div></div>';
  var t=teamInfo(team);
  var m=isMine(team[0])?'mine':'';
  return '<div class="brk-tm '+m+' '+cls+'" '+attr+'>'+logoImg(team[0],'tm-logo-sm')+' <span class="tm-seed">'+t.seed+'</span><div class="tm-info"><div class="tm-name">'+t.name+'</div><div class="tm-owner">'+t.owner+'</div></div><span class="tm-price">'+t.price+'</span></div>';
}

function slotAdv(team,cls,attr){
  if(!team)return '<div class="brk-tm empty"><div class="tm-info"><div class="tm-name">TBD</div></div></div>';
  var m=isMine(team[0])?'mine':'';
  return '<div class="brk-tm '+m+' '+cls+'" '+attr+'>'+logoImg(team[0],'tm-logo-sm')+' <span class="tm-seed">'+team[1]+'</span><div class="tm-info"><div class="tm-name">'+team[0]+'</div></div></div>';
}

function renderRegion(rgn,mirrored){
  var s=brkState[rgn];
  var dir=mirrored?'rtl':'ltr';
  var rounds=['r64','r32','s16','e8'];
  var labels=['1ST ROUND','2ND ROUND','SWEET 16','ELITE 8'];
  if(mirrored){rounds.reverse();labels.reverse();}

  var h='<div class="brk-rgn-title '+rgn.toLowerCase()+'">'+rgn+'</div>';
  h+='<div class="brk-hdrs '+dir+'">';
  labels.forEach(function(l){h+='<div>'+l+'</div>';});
  h+='</div>';
  h+='<div class="brk-cols '+dir+'">';

  // Build each round column
  var colOrder=mirrored?['e8','s16','r32','r64']:['r64','r32','s16','e8'];
  colOrder.forEach(function(rnd){
    h+='<div class="brk-col">';
    if(rnd==='r64'){
      s.r64.forEach(function(g,gi){
        var wa=g.winner&&g.winner[0]===g.a[0],wb=g.winner&&g.winner[0]===g.b[0];
        h+='<div class="brk-mu">';
        h+=slot(g.a,wa?'pk':'','data-adv="'+esc(rgn)+'|r64|'+gi+'|'+esc(g.a[0])+'|'+g.a[1]+'"');
        h+=slot(g.b,wb?'pk':'','data-adv="'+esc(rgn)+'|r64|'+gi+'|'+esc(g.b[0])+'|'+g.b[1]+'"');
        h+='</div>';
      });
    } else if(rnd==='r32'){
      for(var i=0;i<4;i++){
        var g=s.r32[i];
        var mt=(i===0)?'12':'24';
        h+='<div class="brk-mu" style="margin-top:'+mt+'px">';
        if(g){
          var wa=g.winner&&g.a&&g.winner[0]===g.a[0],wb=g.winner&&g.b&&g.winner[0]===g.b[0];
          h+=g.a?slotAdv(g.a,wa?'pk':'','data-adv="'+esc(rgn)+'|r32|'+i+'|'+esc(g.a[0])+'|'+g.a[1]+'"'):slot(null,'','');
          h+=g.b?slotAdv(g.b,wb?'pk':'','data-adv="'+esc(rgn)+'|r32|'+i+'|'+esc(g.b[0])+'|'+g.b[1]+'"'):slot(null,'','');
        } else {h+=slot(null,'','');h+=slot(null,'','');}
        h+='</div>';
      }
    } else if(rnd==='s16'){
      for(var i=0;i<2;i++){
        var g=s.s16[i];
        var mt=(i===0)?'40':'60';
        h+='<div class="brk-mu" style="margin-top:'+mt+'px">';
        if(g){
          var wa=g.winner&&g.a&&g.winner[0]===g.a[0],wb=g.winner&&g.b&&g.winner[0]===g.b[0];
          h+=g.a?slotAdv(g.a,wa?'pk':'','data-adv="'+esc(rgn)+'|s16|'+i+'|'+esc(g.a[0])+'|'+g.a[1]+'"'):slot(null,'','');
          h+=g.b?slotAdv(g.b,wb?'pk':'','data-adv="'+esc(rgn)+'|s16|'+i+'|'+esc(g.b[0])+'|'+g.b[1]+'"'):slot(null,'','');
        } else {h+=slot(null,'','');h+=slot(null,'','');}
        h+='</div>';
      }
    } else if(rnd==='e8'){
      h+='<div class="brk-mu" style="margin-top:100px">';
      if(s.e8){
        var wa=s.e8.winner&&s.e8.a&&s.e8.winner[0]===s.e8.a[0],wb=s.e8.winner&&s.e8.b&&s.e8.winner[0]===s.e8.b[0];
        h+=s.e8.a?slotAdv(s.e8.a,wa?'pk':'','data-adv="'+esc(rgn)+'|e8|0|'+esc(s.e8.a[0])+'|'+s.e8.a[1]+'"'):slot(null,'','');
        h+=s.e8.b?slotAdv(s.e8.b,wb?'pk':'','data-adv="'+esc(rgn)+'|e8|0|'+esc(s.e8.b[0])+'|'+s.e8.b[1]+'"'):slot(null,'','');
      } else {h+=slot(null,'','');h+=slot(null,'','');}
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function renderBrk(){
  var el=document.getElementById('bracketContent');
  var ff=brkState.ff;
  var h='<div class="brk-wrap">';

  // Left half: South (top), East (bottom)
  h+='<div class="brk-half">';
  h+='<div class="brk-rgn">'+renderRegion('South',false)+'</div>';
  h+='<div class="brk-rgn">'+renderRegion('East',false)+'</div>';
  h+='</div>';

  // Center connector
  h+='<div class="brk-center-strip">';
  h+='<div class="brk-center-line"></div>';
  h+='<div class="brk-center-label">FINAL<br>FOUR</div>';
  h+='<div class="brk-center-line"></div>';
  h+='</div>';

  // Right half: West (top), Midwest (bottom)
  h+='<div class="brk-half">';
  h+='<div class="brk-rgn">'+renderRegion('West',true)+'</div>';
  h+='<div class="brk-rgn">'+renderRegion('Midwest',true)+'</div>';
  h+='</div>';

  // Final Four (full width center)
  h+='<div class="brk-ff-center">';
  h+='<div class="brk-ff-label">Final Four</div>';
  h+='<div class="brk-ff-semis">';

  // Semi 1: South vs East
  h+='<div class="brk-ff-game"><div class="brk-ff-game-label">South vs East</div>';
  if(ff.s1){
    var wa=ff.s1.winner&&ff.s1.a&&ff.s1.winner[0]===ff.s1.a[0],wb=ff.s1.winner&&ff.s1.b&&ff.s1.winner[0]===ff.s1.b[0];
    h+=ff.s1.a?slotAdv(ff.s1.a,wa?'pk':'','data-ff="1|'+esc(ff.s1.a[0])+'|'+ff.s1.a[1]+'"'):slot(null,'','');
    h+=ff.s1.b?slotAdv(ff.s1.b,wb?'pk':'','data-ff="1|'+esc(ff.s1.b[0])+'|'+ff.s1.b[1]+'"'):slot(null,'','');
  } else {h+=slot(null,'','');h+=slot(null,'','');}
  h+='</div>';
  h+='<div class="brk-ff-vs">VS</div>';

  // Semi 2: West vs Midwest
  h+='<div class="brk-ff-game"><div class="brk-ff-game-label">West vs Midwest</div>';
  if(ff.s2){
    var wa=ff.s2.winner&&ff.s2.a&&ff.s2.winner[0]===ff.s2.a[0],wb=ff.s2.winner&&ff.s2.b&&ff.s2.winner[0]===ff.s2.b[0];
    h+=ff.s2.a?slotAdv(ff.s2.a,wa?'pk':'','data-ff="2|'+esc(ff.s2.a[0])+'|'+ff.s2.a[1]+'"'):slot(null,'','');
    h+=ff.s2.b?slotAdv(ff.s2.b,wb?'pk':'','data-ff="2|'+esc(ff.s2.b[0])+'|'+ff.s2.b[1]+'"'):slot(null,'','');
  } else {h+=slot(null,'','');h+=slot(null,'','');}
  h+='</div></div>';

  // Championship
  h+='<div class="brk-champ-box"><div class="brk-champ-label">Championship</div>';
  if(ff.s1&&ff.s1.winner&&ff.s2&&ff.s2.winner){
    var c1=ff.champ&&ff.champ[0]===ff.s1.winner[0],c2=ff.champ&&ff.champ[0]===ff.s2.winner[0];
    h+=slotAdv(ff.s1.winner,c1?'pk':'','data-champ="'+esc(ff.s1.winner[0])+'|'+ff.s1.winner[1]+'"');
    h+=slotAdv(ff.s2.winner,c2?'pk':'','data-champ="'+esc(ff.s2.winner[0])+'|'+ff.s2.winner[1]+'"');
  } else {h+=slot(null,'','');h+=slot(null,'','');}
  if(ff.champ){
    h+='<div class="brk-champ-winner">'+ff.champ[0]+'</div>';
  }
  h+='</div>';
  h+='</div>';

  h+='</div>';
  el.innerHTML=h;
}

// ===== EVENT DELEGATION =====
document.addEventListener('click',function(e){
  var gw=e.target.closest('[data-gw]');
  if(gw){markResult(parseInt(gw.getAttribute('data-gw')),'W');return;}
  var gl=e.target.closest('[data-gl]');
  if(gl){markResult(parseInt(gl.getAttribute('data-gl')),'L');return;}
  var undo=e.target.closest('[data-undo]');
  if(undo){undoResult(parseInt(undo.getAttribute('data-undo')));return;}
  var lbt=e.target.closest('[data-lbtoggle]');
  if(lbt){var d=document.getElementById('lb-detail-'+lbt.getAttribute('data-lbtoggle'));if(d)d.classList.toggle('open');return;}
  var el=e.target.closest('[data-adv]');
  if(el){var p=el.getAttribute('data-adv').split('|');advanceTeam(decEsc(p[0]),p[1],parseInt(p[2]),[decEsc(p[3]),parseInt(p[4])]);return;}
  var el2=e.target.closest('[data-ff]');
  if(el2){var p=el2.getAttribute('data-ff').split('|');advanceFF(parseInt(p[0]),[decEsc(p[1]),parseInt(p[2])]);return;}
  var el3=e.target.closest('[data-champ]');
  if(el3){var p=el3.getAttribute('data-champ').split('|');advanceChamp([decEsc(p[0]),parseInt(p[1])]);return;}
});
